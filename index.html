<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <!-- Metadados básicos da página -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SociallyWebsite</title>
    <!-- Link para o arquivo de estilos CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Container principal da seção hero com imagem de fundo e conteúdo central -->
    <div class="Hero">
        <!-- Barra de navegação no topo -->
        <nav>
            <!-- Logo do site/aplicativo -->
            <img src="pictures/logo.png" alt="Logo" class="logo">
            <!-- Lista de links de navegação -->
            <ul>
                <li><a href="#">Recursos</a></li>
                <li><a href="#">Como Trabalhamos</a></li>
                <li><a href="#">Contato</a></li>
            </ul>
            <!-- Botões de ação da navegação -->
            <div>
                <a href="#" class="login-btn">Fazer Login</a>
                <a href="#" class="btn">Baixar App</a>
            </div>
        </nav>

        <!-- Conteúdo principal da página, com título, texto e CTA -->
        <div class="content">
            <!-- Título principal chamando para fazer novos amigos -->
            <h1> Fazer <br>Novos Amigos</h1>
            <!-- Texto descritivo explicando o propósito do serviço -->
            <p>Conecte-se com pessoas de todo o mundo e compartilhe momentos incríveis juntos.</p>
            <!-- Botão principal de chamada para ação -->
            <a href="#" class="btn">Entre Agora</a>
        </div>

        <!-- Imagem ilustrativa posicionada dentro da seção hero -->
        <img src="pictures/pic.png" class="recursos-img anim">
    </div>
</body>
</html>
